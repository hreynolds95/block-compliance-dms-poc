# Block Compliance DMS — Document Registry
# Central metadata index. Mirrors key frontmatter fields for quick lookup by workflows.
#
# Two-role model (PoP Section 2.4):
#   document_owner_github    — GitHub handle of the Document Owner (approves changes + exceptions)
#   document_submitter_github — GitHub handle(s) of authorized Document Submitters (draft + submit)
#
# Stakeholder groups (Awareness Campaign, PoP Section 2.9):
#   stakeholder_groups — list of GitHub Team slugs or Slack channel names notified on publication
#
# Implementation plan link (out of scope for GitHub storage per DocArchitect constraints):
#   implementation_plan_link — external link only; GitHub does not track plan content or status
#
# Update this file whenever a doc is added, removed, or its tier/owner/roles change.
# Changes to this file require Policy Team QC approval (CODEOWNERS gate).

