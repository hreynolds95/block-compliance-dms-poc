name: Publish

# Fires on every push to main. For any .md files changed under docs/,
# updates effective_date + last_reviewed_date in frontmatter, appends to
# the audit log, and sends publication notifications to configured
# stakeholder_groups (PoP Section 2.9 / DocArchitect Section 8.3).

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**/*.md'

permissions:
  contents: write

jobs:
  publish:
    # Skip if this commit was made by the bot (prevents infinite loop)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
          token: ${{ secrets.DMS_POC }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Update frontmatter and write audit log
        run: |
          python3 - <<'EOF'
          import subprocess, yaml, json, os
          from datetime import date, datetime, timezone

          today_date    = date.today()
          today         = today_date.isoformat()
          next_year_iso = (today_date + timedelta(days=365)).isoformat()
          now_iso       = datetime.now(timezone.utc).isoformat()
          sha       = subprocess.run(['git', 'rev-parse', 'HEAD'], capture_output=True, text=True).stdout.strip()
          short_sha = sha[:8]

          # Find docs changed in this commit vs its parent
          result = subprocess.run(
              ['git', 'diff', '--name-only', 'HEAD~1', 'HEAD'],
              capture_output=True, text=True
          )
          changed = [f for f in result.stdout.strip().split('\n')
                     if f.startswith('docs/') and f.endswith('.md')]

          def set_fm_field(text, field, value):
              """Replace or append a frontmatter field without reformatting anything else."""
              lines = text.split('\n')
              if not lines or lines[0].strip() != '---':
                  return text
              end_idx = None
              for i in range(1, len(lines)):
                  if lines[i].strip() == '---':
                      end_idx = i
                      break
              if end_idx is None:
                  return text
              prefix = f'{field}:'
              for i in range(1, end_idx):
                  if lines[i].startswith(prefix):
                      lines[i] = f'{field}: {value}'
                      return '\n'.join(lines)
              lines.insert(end_idx, f'{field}: {value}')
              return '\n'.join(lines)

          audit_entries  = []
          published_docs = []   # richer metadata for notification step

          for path in changed:
              if not os.path.exists(path): continue
              content = open(path).read()
              parts   = content.split('---', 2)
              if len(parts) < 3: continue
              try:
                  fm = yaml.safe_load(parts[1])
              except Exception:
                  continue

              # Surgically update only the fields that change on publish —
              # preserves all original quoting/formatting to keep diffs clean
              content = set_fm_field(content, 'effective_date',     today)
              content = set_fm_field(content, 'last_reviewed_date', today)
              if fm.get('status') == 'in-review':
                  content = set_fm_field(content, 'status', 'published')
              # Advance next_review_date by 365 days only for annual reviews;
              # off-cycle changes do not reset the review clock
              if (fm.get('review_cycle') or '').lower() == 'annual':
                  content = set_fm_field(content, 'next_review_date', next_year_iso)
                  print(f'Advanced next_review_date to {next_year_iso} (annual review)')

              open(path, 'w').write(content)
              # Re-parse to get updated values for audit entry
              fm = yaml.safe_load(content.split('---', 2)[1])
              print(f'Updated frontmatter: {path}')

              entry = {
                  'timestamp':       now_iso,
                  'sha':             sha,
                  'short_sha':       short_sha,
                  'doc_id':          fm.get('doc_id', ''),
                  'title':           fm.get('title', ''),
                  'tier':            fm.get('tier'),
                  'action':          'published',
                  'change_type':     fm.get('change_type', ''),
                  'review_cycle':    fm.get('review_cycle', ''),
                  'effective_date':  today,
                  'next_review_date': fm.get('next_review_date', ''),
                  'actor':           '${{ github.actor }}',
              }
              audit_entries.append(entry)

              # Richer metadata passed to notification step via temp file
              published_docs.append({
                  'doc_id':        fm.get('doc_id', ''),
                  'title':         fm.get('title', ''),
                  'tier':          fm.get('tier'),
                  'domain':        fm.get('domain', ''),
                  'doc_type':      fm.get('doc_type', ''),
                  'change_type':   fm.get('change_type', ''),
                  'owner':         fm.get('owner', ''),
                  'effective_date': today,
                  'published_pdf': fm.get('published_pdf', ''),
              })

          if not audit_entries:
              print('No publishable docs found.')
              # Write empty file so notification step exits cleanly
              with open('/tmp/publish-docs.json', 'w') as f:
                  json.dump([], f)
              exit(0)

          # Append to audit log
          os.makedirs('audit', exist_ok=True)
          with open('audit/audit-log.jsonl', 'a') as f:
              for entry in audit_entries:
                  f.write(json.dumps(entry) + '\n')
          print(f'Appended {len(audit_entries)} audit entry/entries.')

          # Write metadata for notification step
          with open('/tmp/publish-docs.json', 'w') as f:
              json.dump(published_docs, f)
          print(f'Written {len(published_docs)} doc(s) to /tmp/publish-docs.json')
          EOF

      - name: Commit frontmatter updates and audit log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ audit/audit-log.jsonl
          git diff --cached --quiet && echo "Nothing to commit." || \
            git commit -m "chore(publish): update frontmatter + audit log [skip ci]"
          git push

      - name: Send publication notifications
        # PoP Section 2.9 / DocArchitect Section 8.3
        # Phase 1: SLACK_WEBHOOK_URL not configured — logs payload to Actions run.
        # Phase 2: Set SLACK_WEBHOOK_URL secret to activate live Slack delivery.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 - <<'EOF'
          import json, yaml, os, urllib.request

          # Read published docs written by the update step
          try:
              with open('/tmp/publish-docs.json') as f:
                  published = json.load(f)
          except FileNotFoundError:
              print('No published-docs file found — skipping notifications.')
              exit(0)

          if not published:
              print('No published docs — skipping notifications.')
              exit(0)

          # Load registry to resolve stakeholder_groups per doc
          with open('document-registry.yaml') as f:
              registry = yaml.safe_load(f)

          registry_by_id = {d['doc_id']: d for d in registry.get('documents', [])}

          # Build channel → docs mapping, deduplicating channels across docs
          channel_docs = {}
          for doc in published:
              reg = registry_by_id.get(doc['doc_id'], {})
              for channel in reg.get('stakeholder_groups', []):
                  channel_docs.setdefault(channel, []).append(doc)

          if not channel_docs:
              print('No stakeholder_groups configured — skipping notifications.')
              exit(0)

          portal_url  = 'https://hreynolds95.github.io/block-compliance-policies/'
          webhook_url = os.environ.get('SLACK_WEBHOOK_URL', '')

          for channel, docs in channel_docs.items():
              doc_lines = []
              for doc in docs:
                  pdf_line = f'\n  {doc["published_pdf"]}' if doc.get('published_pdf') else ''
                  doc_lines.append(
                      f"\u2022 *{doc['title']}* ({doc['doc_id']})\n"
                      f"  Tier {doc['tier']} \u00b7 {doc['domain']} \u00b7 {doc['doc_type']}\n"
                      f"  Change type: {doc.get('change_type') or 'N/A'} \u00b7 Owner: {doc.get('owner') or 'N/A'}\n"
                      f"  Effective: {doc['effective_date']}{pdf_line}"
                  )

              text = (
                  ':page_facing_up: *Compliance Document Published*\n\n'
                  'The following document(s) were published to the Block Compliance library:\n\n'
                  + '\n\n'.join(doc_lines)
                  + f'\n\nView the full library: {portal_url}'
              )

              payload = {'channel': channel, 'text': text}

              if webhook_url:
                  try:
                      data = json.dumps(payload).encode()
                      req  = urllib.request.Request(
                          webhook_url, data=data,
                          headers={'Content-Type': 'application/json'}
                      )
                      urllib.request.urlopen(req)
                      print(f'Notified: {channel} ({len(docs)} doc(s))')
                  except Exception as e:
                      print(f'ERROR posting to {channel}: {e}')
                      print(f'Payload:\n{json.dumps(payload, indent=2)}')
              else:
                  print(f'Would notify: {channel} ({len(docs)} doc(s))')
                  print(f'Payload:\n{json.dumps(payload, indent=2)}')
          EOF
